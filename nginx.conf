server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Support for React Router (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ requests to the backend Cloud Run URL
    location /api/ {
        proxy_pass https://gizisnap-backend-1004063957486.asia-southeast1.run.app/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host gizisnap-backend-1004063957486.asia-southeast1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /uploads/ requests to the backend Cloud Run URL
    location /uploads/ {
        proxy_pass https://gizisnap-backend-1004063957486.asia-southeast1.run.app/uploads/;
        proxy_ssl_server_name on;
        proxy_set_header Host gizisnap-backend-1004063957486.asia-southeast1.run.app;
    }
}
